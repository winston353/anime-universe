<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>404 — Врата не найдены · Anime Universe</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070a14;
    --arcane:#8b5cf6;
    --arcane-soft:#a78bfa;
    --mana:#38bdf8;
    --gold:#fbbf24;
    --ink:#dbe4ff;
    --muted:#7c89b0;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --body:"Manrope",system-ui,sans-serif;
    --display:"Russo One",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 50% 40%, #131a3a 0%, transparent 62%),
      var(--void);
    color:var(--ink);font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  #stars{position:fixed;inset:0;pointer-events:none}
  #stars i{position:absolute;background:#becaff;border-radius:50%;opacity:.5;animation:tw 3s ease-in-out infinite}
  @keyframes tw{50%{opacity:.12}}

  .wrap{position:relative;text-align:center;animation:in .9s ease both;max-width:100vw}
  @keyframes in{from{opacity:0;transform:translateY(14px);filter:blur(6px)}to{opacity:1;transform:none;filter:none}}

  .eyebrow{
    font-family:var(--mono);font-size:10px;letter-spacing:.34em;
    color:var(--arcane-soft);text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;gap:10px;
    position:relative;z-index:3;
  }
  .eyebrow::before,.eyebrow::after{content:"";width:26px;height:1px;background:var(--arcane)}

  /* герой: огромные цифры позади, персонаж поверх */
  .hero{
    position:relative;
    height:min(clamp(280px,54vh,560px),96vw);
    display:flex;align-items:center;justify-content:center;
    margin-top:4px;
  }
  .big{
    font-family:var(--display);
    font-size:min(clamp(170px,34vh,360px),42vw);
    line-height:1;letter-spacing:.04em;
    color:rgba(167,139,250,.14);
    text-shadow:0 0 70px rgba(139,92,246,.35);
    user-select:none;
    position:relative;z-index:1;
  }
  .glow{
    position:absolute;left:50%;bottom:0;translate:-50% 12%;
    width:min(70vh,90vw);height:min(70vh,90vw);
    background:
      radial-gradient(circle at 50% 62%, rgba(251,191,36,.14) 0%, transparent 46%),
      radial-gradient(circle at 50% 55%, rgba(139,92,246,.30) 0%, transparent 62%);
    z-index:2;pointer-events:none;
  }
  .chara{
    position:absolute;left:50%;bottom:0;translate:-50%;
    height:92%;
    z-index:3;
    filter:drop-shadow(0 0 30px rgba(139,92,246,.5)) drop-shadow(0 0 90px rgba(251,191,36,.18));
    -webkit-mask-image:linear-gradient(180deg,#000 82%,transparent 99%);
    mask-image:linear-gradient(180deg,#000 82%,transparent 99%);
    animation:float 6s ease-in-out infinite;
  }
  @keyframes float{50%{transform:translateY(-8px)}}

  h1{
    font-family:var(--display);
    font-size:clamp(17px,4.4vw,30px);
    letter-spacing:.3em;margin-top:18px;color:#eef1ff;text-transform:uppercase;
    text-shadow:0 0 24px rgba(139,92,246,.55);
    padding-left:.3em;
    position:relative;z-index:3;
  }
  .sub{
    margin-top:12px;font-size:clamp(12.5px,3.4vw,14.5px);color:var(--muted);line-height:1.65;
    max-width:440px;margin-left:auto;margin-right:auto;
    position:relative;z-index:3;
  }
  .sub b{color:var(--gold);font-weight:600}
  .back{
    display:inline-flex;align-items:center;gap:10px;
    margin-top:24px;padding:13px 30px;text-decoration:none;
    font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:#0a0d1c;
    background:linear-gradient(120deg,var(--arcane-soft),var(--mana));
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
    transition:filter .2s, transform .15s;
    position:relative;z-index:3;
  }
  .back:hover{filter:brightness(1.15);transform:translateY(-1px)}
  .path{
    margin-top:16px;font-family:var(--mono);font-size:10px;color:#4d5a80;letter-spacing:.08em;
    max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    margin-left:auto;margin-right:auto;
  }

  @media (max-width:480px){
    h1{letter-spacing:.16em;font-size:clamp(15px,4.6vw,22px);padding-left:.16em}
  }
  @media (max-height:640px){
    .hero{height:min(46vh,96vw)}
    h1{margin-top:12px}
    .back{margin-top:16px}
  }
  @media (prefers-reduced-motion: reduce){
    .wrap{animation:none}
    #stars i{animation:none}
    .chara{animation:none}
  }
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="eyebrow">Система // Ошибка 404</div>
  <div class="hero">
    <div class="big">404</div>
    <div class="glow"></div>
    <img class="chara" src="/404.png?v=2" alt="">
  </div>
  <h1>Врата не найдены</h1>
  <p class="sub">Такой страницы нет в этой вселенной — возможно, её поглотил разлом.<br>
  Возвращайся на карту: там <b>1307</b> миров ещё на месте.</p>
  <a class="back" href="/">◈ ВЕРНУТЬСЯ НА КАРТУ</a>
  <div class="path" id="path"></div>
</div>
<script>
"use strict";
const box=document.getElementById("stars");
for(let i=0;i<70;i++){
  const s=document.createElement("i");
  const z=Math.random();
  s.style.left=(Math.random()*100)+"vw";
  s.style.top=(Math.random()*100)+"vh";
  s.style.width=s.style.height=(z>.85?2.2:1.3)+"px";
  s.style.animationDelay=(Math.random()*3)+"s";
  s.style.animationDuration=(2.2+Math.random()*2.6)+"s";
  box.appendChild(s);
}
const p=document.getElementById("path");
if(location.pathname&&location.pathname!=="/404.html")
  p.textContent="запрошенный путь: "+location.pathname;
</script>
</body>
</html>
